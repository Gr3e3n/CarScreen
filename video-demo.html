<!DOCTYPE html>
<html>
<head>
    <title>视频演示 - CarSafety</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; max-width: 800px; margin: 40px auto; padding: 20px; text-align: center; }
        video { width: 100%; border-radius: 8px; }
        .close-btn {
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .close-btn:hover { background-color: #c82333; }
        .note { color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🚗 CarSafety 演示视频</h1>
    
    <video controls width="100%">
        <source src="https://gr3e3n.github.io/CarSafety/demo/demo.mp4" type="video/mp4">
        您的浏览器不支持视频标签。
    </video>
    
    <div>
        <button onclick="closeAndGoBack()" class="close-btn">
            ✕ 观看完毕，关闭本页并返回README
        </button>
    </div>
    <p class="note">点击后自动切换回原 README 页面，并尝试关闭当前视频页。</p>

    <script>
    function closeAndGoBack() {
        // 让原 README 标签页获得焦点
        if (window.opener && !window.opener.closed) {
            window.opener.focus();
        } else {
            alert('无法找到原 README 页面，请手动切换。');
        }
        
        // 尝试关闭当前页
        try {
            window.close();
        } catch(e) {
            alert('浏览器阻止了自动关闭，请手动关闭此标签页。');
        }
    }
    </script>
</body>
</html>
